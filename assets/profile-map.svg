  <text x="74" y="132" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18">Computational methods that make physical and bodily phenomena measurable, simulable and interactive.</text>

