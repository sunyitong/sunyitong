<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Yitong Sun research map</title>
  <desc id="desc">A compact map of research strands across simulation, sensing, immersive systems, computational life, and interactive research infrastructure.</desc>
